services:
  app:
    image: fireflyiii/core:latest
    container_name: firefly_iii_app
    hostname: app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - firefly_iii_upload:/var/www/html/storage/upload
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - firefly_iii

  db:
    image: mariadb:lts
    container_name: firefly_iii_db
    hostname: db
    restart: unless-stopped
    env_file:
      - .db.env
    volumes:
      - firefly_iii_db:/var/lib/mysql
    networks:
      - firefly_iii

  cron:
    image: alpine
    container_name: firefly_iii_cron
    restart: unless-stopped
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        apk add --no-cache tzdata wget
        ln -sf "/usr/share/zoneinfo/$TZ" /etc/localtime || true
        echo "0 3 * * * wget -qO- http://app:8080/api/v1/cron/$STATIC_CRON_TOKEN; echo" | crontab -
        crond -f -L /dev/stdout
    depends_on:
      - app
    networks:
      - firefly_iii

volumes:
  firefly_iii_upload:
  firefly_iii_db:

networks:
  firefly_iii:
    driver: bridge
